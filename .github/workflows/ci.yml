# Monorepo: backend (repo root) + Next.js in _ai-share/synth-1-full/
# See docs/RUNBOOK.md. Jobs run in parallel to keep wall time low.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry config virtualenvs.create true
          poetry install --no-interaction --without ml

      - name: Pytest (smoke + unit)
        run: poetry run pytest tests/smoke tests/unit -q --tb=short

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: _ai-share/synth-1-full
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: _ai-share/synth-1-full/package-lock.json

      - run: npm ci

      - name: Production build
        run: NODE_OPTIONS=--max-old-space-size=8192 npm run build
