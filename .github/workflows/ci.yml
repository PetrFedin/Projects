# Monorepo: backend (repo root) + Next.js in _ai-share/synth-1-full/
# See docs/RUNBOOK.md. Jobs run in parallel to keep wall time low.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gsd-cursor-paths:
    name: GSD portable paths (.cursor)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/check-gsd-cursor-paths.sh

  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry config virtualenvs.create true
          poetry install --no-interaction --without ml --with dev
          poetry run pip install 'aiosqlite>=0.20.0' 'email-validator>=2.0.0' 'reportlab>=4.0.0'

      - name: Pytest (smoke + unit)
        run: poetry run python -m pytest tests/smoke tests/unit -q --tb=short

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      NODE_OPTIONS: --max-old-space-size=6144
    defaults:
      run:
        working-directory: _ai-share/synth-1-full
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: _ai-share/synth-1-full/package-lock.json

      - run: npm ci

      - name: Add swap for Next.js build
        run: |
          sudo swapoff -a || true
          if ! sudo fallocate -l 8G /swapfile 2>/dev/null; then
            sudo dd if=/dev/zero of=/swapfile bs=1M count=8192 status=none
          fi
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Category catalog & schemas
        run: |
          npm run gen:category-catalog
          npm run gen:tz-leaf-requirements
          npm run validate:category-handbook
          npm run schemas:validate
          npm run schemas:validate:examples

      - name: ESLint (errors only, lib scope)
        run: npm run lint:errors

      - name: TypeScript (CI subset, non-blocking tech debt)
        run: npm run typecheck:ci
        continue-on-error: true

      - name: Production build
        run: npm run build
