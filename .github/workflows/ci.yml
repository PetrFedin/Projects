name: Synth-1 CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  gsd-cursor-paths:
    name: GSD portable paths (.cursor)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/check-gsd-cursor-paths.sh

  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install poetry ruff mypy pytest pytest-cov
        poetry install

    - name: Run Ruff
      run: ruff check app

    - name: Check formatting
      run: ruff format --check app

    - name: Run Mypy
      run: mypy app

    - name: Run Tests
      run: pytest --cov=app tests/

    - name: Pip audit
      run: pip audit

  frontend-schemas:
    name: Frontend (full) schemas & handbook
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: _ai-share/synth-1-full
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: _ai-share/synth-1-full/package-lock.json
      - run: npm ci
      - run: npm run gen:category-catalog
      - run: npm run gen:tz-leaf-requirements
      - run: npm run validate:category-handbook
      - run: npm run schemas:validate
      - run: npm run schemas:validate:examples
