services:
  postgres:
    image: postgres:16
    container_name: synth-workshop2-postgres
    environment:
      POSTGRES_USER: workshop2
      POSTGRES_PASSWORD: workshop2_dev
      POSTGRES_DB: workshop2
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workshop2 -d workshop2"]
      interval: 5s
      timeout: 5s
      start_period: 10s
      retries: 5
  minio:
    image: minio/minio
    container_name: synth-workshop2-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      start_period: 15s
      retries: 5
