<svg xmlns="http://www.w3.org/2000/svg" width="76" height="17" viewBox="0 0 76 17" fill="none" aria-hidden="true">
  <!-- Hook arc — visually “catches” the mark before the bar snaps in -->
  <path
    class="logo-hook"
    d="M14 2 C14 2 10 2 8 5 C6 8 8 11 12 11"
    stroke="#FFFFFF"
    stroke-width="1.25"
    stroke-linecap="round"
    fill="none"
    opacity="0.85"
  />
  <!-- Brand mark -->
  <rect class="logo-mark" x="0" y="0" width="18" height="17" rx="3" fill="#FFFFFF"/>
  <!-- Inner monogram cut — improves recognition at small sizes -->
  <rect class="logo-mark-inner" x="5" y="4" width="8" height="9" rx="1.5" fill="#000000" opacity="0.92"/>
  <!-- Wordmark bar -->
  <rect class="logo-bar" x="0" y="6" width="76" height="5" rx="2.5" fill="#FFFFFF"/>
  <!-- Accent from product palette (#C4A882) -->
  <circle class="logo-accent" cx="15" cy="3" r="1.5" fill="#C4A882"/>
</svg>
