<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Switcher</title>
    <!--
    FFmpeg instructions (run from project root after adding a video to assets/):

    1. Convert .mov (HEVC) to browser-compatible H.264 .mp4:
       ffmpeg -i assets/YOUR_VIDEO.mov -c:v libx264 -preset fast -crf 23 -pix_fmt yuv420p -an assets/product.mp4

    2. Extract thumb preview frames at section midpoints (replace DURATION and INPUT):
       DURATION=$(ffprobe -v error -show_entries format=duration -of csv=p=0 assets/product.mp4)
       T1=$(echo "$DURATION / 6" | bc -l)
       T2=$(echo "$DURATION / 2" | bc -l)
       T3=$(echo "$DURATION * 5 / 6" | bc -l)
       ffmpeg -ss "$T1" -i assets/product.mp4 -frames:v 1 -q:v 2 assets/nav-icon-1.png
       ffmpeg -ss "$T2" -i assets/product.mp4 -frames:v 1 -q:v 2 assets/nav-icon-2.png
       ffmpeg -ss "$T3" -i assets/product.mp4 -frames:v 1 -q:v 2 assets/nav-icon-3.png

    3. Serve with range-request support (required for video seeking):
       npx serve .

    Python http.server does NOT support HTTP Range requests — video.currentTime seeking will fail.
    See .cursor/rules/video-media.mdc for full pipeline docs.
  -->
    <link rel="stylesheet" href="styles/main.css" />
  </head>
  <body>
    <nav class="top-nav" aria-label="Main navigation">
      <div class="top-nav__group">
        <span class="top-nav__item">Women</span>
        <span class="top-nav__item">Man</span>
        <span class="top-nav__item">Bags</span>
      </div>
      <button
        type="button"
        class="top-nav__logo"
        id="brandLogo"
        aria-label="Brand logo — replay animation"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="76"
          height="17"
          viewBox="0 0 76 17"
          fill="none"
          aria-hidden="true"
        >
          <defs>
            <filter id="logoGlow" x="-40%" y="-80%" width="180%" height="260%">
              <feGaussianBlur stdDeviation="1.2" result="blur" />
              <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
              </feMerge>
            </filter>
          </defs>
          <g class="logo-glow-group" filter="url(#logoGlow)">
            <path
              class="logo-hook"
              d="M14 2 C14 2 10 2 8 5 C6 8 8 11 12 11"
              stroke="#FFFFFF"
              stroke-width="1.25"
              stroke-linecap="round"
              fill="none"
              opacity="0.85"
            />
            <rect class="logo-mark" x="0" y="0" width="18" height="17" rx="3" fill="#FFFFFF" />
            <rect
              class="logo-mark-inner"
              x="5"
              y="4"
              width="8"
              height="9"
              rx="1.5"
              fill="#000000"
              opacity="0.92"
            />
            <rect class="logo-bar" x="0" y="6" width="76" height="5" rx="2.5" fill="#FFFFFF" />
            <circle class="logo-accent" cx="15" cy="3" r="1.5" fill="#C4A882" />
          </g>
        </svg>
        <span class="top-nav__logo-tagline" aria-hidden="true">Milano · Craft</span>
      </button>
      <div class="top-nav__group">
        <span class="top-nav__item">Wishlist</span>
        <span class="top-nav__item">Account</span>
        <span class="top-nav__item">Bag</span>
      </div>
    </nav>

    <main class="card">
      <div class="central-area" id="centralArea">
        <!-- Video or fallback injected by JS -->
      </div>

      <aside class="info-left">
        <h1 class="info-left__title">Item Name</h1>
        <div class="info-left__details">
          <div>Material type</div>
          <div>Style variant</div>
          <div class="info-left__dimensions">00 × 00 × 00</div>
          <div class="info-left__more">more details</div>
        </div>
      </aside>

      <aside class="info-right">
        <div class="info-right__price">0000$</div>
        <div class="info-right__origin">Made in Italy</div>
        <button type="button" class="info-right__btn">Add to cart</button>
      </aside>

      <div class="switcher" id="switcher" role="tablist" aria-label="Product variants">
        <!-- Thumbs injected by JS -->
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/gsap.min.js"></script>
    <script src="scripts/logo-animation.js"></script>
    <script src="scripts/main.js"></script>
  </body>
</html>
